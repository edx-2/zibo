<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Zibo's Cosmic Quest</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050010;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #050010;
      box-shadow: 0 0 60px rgba(80, 50, 200, 0.4);
    }
    #boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: linear-gradient(180deg, #0a0420 0%, #1a0840 100%);
      z-index: 10;
    }
    #boot button {
      font-size: 28px;
      padding: 18px 36px;
      background: #ffd84d;
      color: #1a0840;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 6px 0 #c8a430;
    }
    #boot button:active { transform: translateY(2px); box-shadow: 0 4px 0 #c8a430; }
    #boot p { color: #ddd; font-size: 14px; max-width: 480px; text-align: center; }
  </style>
</head>
<body>
  <div id="boot">
    <h1 style="margin:0;font-size:42px;color:#ffd84d;text-shadow:0 4px 0 #1a0840;">Zibo's Cosmic Quest</h1>
    <button id="bootStart">Start</button>
    <p>Tap Start to enable audio. Use <b>Arrow keys</b> + <b>Space</b> on a keyboard, or connect a <b>LEGO Powered Up Remote</b> from the title screen.</p>
  </div>
  <div id="stage">
    <canvas id="game" width="1280" height="720"></canvas>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
